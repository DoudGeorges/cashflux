{% extends "layout.html" %} {% block title %}Sign in | CashFlux{% endblock %} {%
block content %}
<div class="auth-page">
  <button
    type="button"
    class="theme-toggle theme-toggle--floating"
    data-theme-toggle
    aria-pressed="false"
    aria-label="Switch to dark mode"
  >
    <span class="theme-toggle-icon theme-toggle-icon-light"
      ><i class="fa-solid fa-moon"></i
    ></span>
    <span class="theme-toggle-icon theme-toggle-icon-dark" hidden
      ><i class="fa-solid fa-sun"></i
    ></span>
    <span class="theme-toggle-label">Dark mode</span>
  </button>
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" x2="12" y1="2" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
      </div>
      <h1>CashFlux</h1>
      <p>Sign in to your company workspace</p>
    </div>

    {% if error %}
    <div class="auth-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      <label class="auth-field">
        <span>Email</span>
        <input
          type="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@company.com"
        />
      </label>
      <label class="auth-field">
        <span>Password</span>
        <input
          type="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </label>
      <button type="submit" class="auth-submit">Sign in</button>
    </form>

    <p class="auth-switch">
      New here?
      <a href="{{ url_for('signup') }}">Create a company or join your team</a>
    </p>
  </div>
</div>
{% endblock %}
